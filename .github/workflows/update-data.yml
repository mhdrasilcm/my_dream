name: Refresh Live Data

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: 

jobs:
  refresh:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch Latest News
        run: python fetch_news.py
        
      - name: Fetch Latest Stats
        run: python fetch_stats.py

      - name: Fetch Latest Matches
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python fetch_matches.py

      # Added: Runs your achievements generator script
      - name: Fetch Latest Achievements
        run: python fetch_achievements.py

      # Updated: Staged achievements.json alongside your other files
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json stats.json matches.json achievements.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-update live data" && git push)

      - name: Trigger Cloudflare Pages Rebuild
        run: curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"