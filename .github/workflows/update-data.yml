name: Refresh Live Data

# Keeps stats.json, matches.json and news.json fresh without anyone touching
# a keyboard. Every commit this makes automatically triggers a new Cloudflare
# Pages deployment, since Pages redeploys on every push to the connected branch.

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours — adjust to taste
  workflow_dispatch: {}       # lets you trigger a refresh manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest career stats
        run: python fetch_stats.py

      - name: Fetch next match schedule
        run: python fetch_matches.py

      - name: Fetch latest news
        run: python fetch_news.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "golden-pitch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add stats.json matches.json news.json
          git diff --cached --quiet || git commit -m "Auto-update live data [skip ci]"
          git push
