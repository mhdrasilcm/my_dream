name: Refresh Live Data

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual trigger anytime from GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch News Data
        run: python fetch_news.py

      - name: Fetch Stats Data
        run: python fetch_stats.py

      - name: Fetch Comparison Data
        run: python fetch_comparison.py

      - name: Commit and Push Updated Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add news.json stats.json comparison.json
          git diff-index --quiet HEAD || git commit -m "auto: update news, stats, and comparison data"
          git push