<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The latest Lionel Messi headlines — Inter Miami, Argentina, and family updates, refreshed automatically.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Messi News | Updates & Family">
    <meta property="og:description" content="Leo, Antonela, and team updates — live from the world's newsrooms.">
    <meta property="og:image" content="hero.png">
    <meta name="twitter:card" content="summary_large_image">
    <title>Messi News | Updates & Family</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar animate-fade-down">
        <div class="logo">MESSI<span>10</span></div>
        <ul class="nav-links">
            <li><a href="index.html#stats-section">Stats</a></li>
            <li><a href="biography.html">Biography</a></li>
            <li><a href="achievements.html" class="highlight-link">Achievements</a></li>
            <li><a href="news.html">Latest News</a></li>
        </ul>
        <button class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- Premium News Header Section -->
    <header class="hero" style="min-height: 40vh; padding-bottom: 0;">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
            <h1 class="title animate-fade-up">LATEST NEWS</h1>
            <p class="subtitle animate-fade-up delay-1" style="margin-bottom: 2rem;">Leo, Antonela, & Team Updates</p>
        </div>
    </header>

    <!-- Automated Stream Grid -->
    <main class="premium-section stats-section" style="padding-top: 2rem;">
        <div class="bg-watermark">NEWS</div>
        
        <div id="news-container" class="news-grid animate-fade-up delay-2" style="position: relative; z-index: 2;">
            <!-- Skeleton placeholders shown while news.js fetches and parses news.json -->
            <div class="news-card skeleton-card">
                <span class="skeleton skeleton-line short"></span>
                <span class="skeleton skeleton-line long"></span>
                <span class="skeleton skeleton-line long two"></span>
            </div>
            <div class="news-card skeleton-card">
                <span class="skeleton skeleton-line short"></span>
                <span class="skeleton skeleton-line long"></span>
                <span class="skeleton skeleton-line long two"></span>
            </div>
            <div class="news-card skeleton-card">
                <span class="skeleton skeleton-line short"></span>
                <span class="skeleton skeleton-line long"></span>
                <span class="skeleton skeleton-line long two"></span>
            </div>
        </div>
    </main>

    <!-- Permanent Footer -->
    <footer>
        <p>Created with <span style="color: #00b4d8;">&hearts;</span> <strong>MUHAMMED RASIL CM</strong>, PALAKKAD, KERALA, INDIA</p>
    </footer>

    <button id="back-to-top" class="back-to-top" aria-label="Back to top">↑</button>

    <!-- Shared site behavior, then the news-fetching pipeline -->
    <script src="main.js"></script>
    <script src="news.js"></script>
</body>
</html>
